name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure required folders exist
        run: |
          mkdir -p data
          mkdir -p data/snapshots
          mkdir -p model_registry
          mkdir -p results

      - name: Create dataset if missing
        run: |
          python - <<'PY'
          import os
          import pandas as pd
          import numpy as np

          os.makedirs("data", exist_ok=True)

          data_path = "data/creditcard.csv"

          if not os.path.exists(data_path):
              np.random.seed(42)
              rows = 400

              data = {
                  "Time": np.arange(rows, dtype=float)
              }

              for i in range(1, 29):
                  data[f"V{i}"] = np.random.normal(0, 1, rows)

              data["Amount"] = np.random.uniform(1, 500, rows)

              target = np.zeros(rows, dtype=int)
              target[:40] = 1
              np.random.shuffle(target)
              data["Class"] = target

              df = pd.DataFrame(data)
              df.to_csv(data_path, index=False)

              print(f"Created synthetic dataset at {data_path}")
          else:
              print(f"Dataset already exists at {data_path}")
          PY

      - name: Train models
        run: |
          python -m pipeline.train.train_models

